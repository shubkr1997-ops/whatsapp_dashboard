<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getFunctions } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA2Gv9aoUQ9ploGpgyX_AO_9yVcHHj04sA",
            authDomain: "whatsappdashboard-bfa45.firebaseapp.com",
            projectId: "whatsappdashboard-bfa45",
            storageBucket: "whatsappdashboard-bfa45.firebasestorage.app",
            messagingSenderId: "397978204831",
            appId: "1:397978204831:web:c6629602491bd4b93500aa",
            measurementId: "G-SHQXCH2SFY"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.storage = getStorage(app);
        window.functions = getFunctions(app);

        // Make Firebase available globally
        window.firebase = { app, db: window.db, auth: window.auth, storage: window.storage, functions: window.functions };
    </script>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebarHeader">
            <div id="userProfile">
                <img id="userAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" alt="Profile">
                <div id="userInfo">
                    <div id="userName">Dashboard</div>
                    <div id="userStatus">Online</div>
                </div>
            </div>
            <button id="btnSettings" title="Settings">
                <i data-lucide="settings"></i>
            </button>
        </div>

        <!-- Search -->
        <div id="searchContainer">
            <input type="text" id="chatSearch" placeholder="Search chats...">
        </div>

        <!-- Filter Pills -->
        <div id="filterPills">
            <button class="filter-pill active" data-filter="all">All</button>
            <button class="filter-pill" data-filter="unread">Unread</button>
            <button class="filter-pill" data-filter="favorites">Favorites</button>
        </div>

        <!-- Chat List -->
        <div id="chatList"></div>
    </div>

    <!-- Main Content Area -->
    <div id="mainContent">
        <!-- Welcome Screen -->
        <div id="welcomeScreen">
            <div class="welcome-content">
                <i data-lucide="message-circle" class="welcome-icon"></i>
                <h1>Welcome to WhatsApp Dashboard</h1>
                <p>Select a conversation to start messaging</p>
                <div class="welcome-actions">
                    <button id="newChatBtn" class="primary-btn">
                        <i data-lucide="plus"></i>
                        New Chat
                    </button>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chatArea" style="display: none;">
            <!-- Chat Header -->
            <div id="chatHeader">
                <div id="contactInfo">
                    <img id="headerAvatar" src="" alt="Contact">
                    <div id="contactDetails">
                        <div id="headerName"></div>
                        <div id="headerStatus"></div>
                    </div>
                </div>
                <div class="chat-actions">
                    <button id="modeToggleBtn" title="Toggle AI Mode">
                        <i id="modeIcon" data-lucide="bot"></i>
                        <span id="modeLabel">AI</span>
                    </button>
                    <button id="btnDetails" title="Contact Details">
                        <i data-lucide="info"></i>
                    </button>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer">
                <div id="chatMessages"></div>
            </div>

            <!-- Message Input -->
            <div id="messageInputContainer">
                <div class="input-wrapper">
                    <button id="plusBtn" title="Attach">
                        <i data-lucide="plus"></i>
                    </button>
                    <input type="text" id="messageInput" placeholder="Type a message...">
                    <button id="micBtn" title="Voice Message">
                        <i data-lucide="mic"></i>
                    </button>
                    <button id="sendBtn" title="Send" disabled>
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Details Panel -->
    <div id="detailsPanel">
        <div class="details-header">
            <h3>Contact Details</h3>
            <button id="closeDetails">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="details-content">
            <div class="contact-avatar">
                <img id="detailsAvatar" src="" alt="Contact">
            </div>
            <div class="contact-info">
                <h4 id="detailsName"></h4>
                <p id="detailsPhone"></p>
                <p id="detailsAbout"></p>
            </div>
            <div class="details-actions">
                <button id="btnFavorite" class="action-btn">
                    <i data-lucide="star"></i>
                    Favorite
                </button>
                <button id="btnClearHistory" class="action-btn">
                    <i data-lucide="trash-2"></i>
                    Clear History
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Drawer -->
    <div id="settingsDrawer">
        <div class="settings-header">
            <h3>Settings</h3>
            <button id="closeSettings">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="settings-content">
            <!-- Settings content will be populated by JS -->
        </div>
    </div>

    <!-- Modals and Overlays -->
    <div id="attachmentMenu" class="modal-overlay" style="display: none;">
        <div class="attachment-options">
            <button class="attachment-option" data-type="image">
                <i data-lucide="image"></i>
                Image
            </button>
            <button class="attachment-option" data-type="video">
                <i data-lucide="video"></i>
                Video
            </button>
            <button class="attachment-option" data-type="document">
                <i data-lucide="file-text"></i>
                Document
            </button>
        </div>
    </div>

    <div id="recordingUI" style="display: none;">
        <div class="recording-indicator">
            <i data-lucide="mic"></i>
            <span>Recording...</span>
        </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <input type="file" id="videoInput" accept="video/*" style="display: none;">
    <input type="file" id="documentInput" accept="application/pdf,text/*" style="display: none;">

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
